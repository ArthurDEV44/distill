# Smithery configuration for distill-mcp
# https://smithery.ai/docs/build/project-config/smithery.yaml

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      verbose:
        type: boolean
        description: Enable verbose logging to stderr.
        default: false
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['distill-mcp', 'serve', ...(config.verbose ? ['--verbose'] : [])],
    })

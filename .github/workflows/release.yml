name: Release

# Publishes distill-mcp to npm via npm Trusted Publishing (OIDC) when a version
# tag is pushed. No long-lived npm token: GitHub proves this workflow's identity
# over OIDC and npm mints a short-lived credential for this single publish, with
# a verifiable provenance attestation. Setup once on npmjs.com:
# package distill-mcp > Settings > Trusted Publishing > GitHub Actions,
# repo ArthurDEV44/distill, workflow release.yml.
#
# Flow: bump the version + push to main (CI runs full tests), then push a
# matching vX.Y.Z tag to trigger this workflow. The GitHub Release and its notes
# are authored by hand, not by this workflow.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  # Required for OIDC Trusted Publishing and provenance attestation.
  id-token: write

jobs:
  publish:
    name: Publish distill-mcp to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(jq -r .version packages/mcp-server/package.json)"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package version $PKG"
            exit 1
          fi
          echo "Tag matches package version: $PKG"

      - name: Upgrade npm for Trusted Publishing
        # OIDC Trusted Publishing requires npm >= 11.5.1; the bundled npm is older.
        run: npm install -g npm@latest

      - name: Publish to npm (Trusted Publishing + provenance)
        # Run from the repo root with --workspace so npm resolves the workspace:
        # protocol in devDependencies (a publish from inside the package dir cannot).
        # OIDC auth and provenance are picked up automatically from id-token; no
        # token is configured anywhere.
        run: npm publish --workspace packages/mcp-server --provenance --access public

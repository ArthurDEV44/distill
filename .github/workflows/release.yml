name: Release

# Publishes the distill-mcp package to npm when a version tag is pushed.
# Flow: bump the version + push to main (CI runs full tests), then push a
# matching `vX.Y.Z` tag to trigger this workflow. The GitHub Release and its
# notes are authored separately (by hand), not by this workflow.
on:
  push:
    tags:
      - "v*"

# Least-privilege: this workflow only reads the repo and publishes to npm
# with NPM_TOKEN. It does not write to the repo or create releases.
permissions:
  contents: read

jobs:
  publish:
    name: Publish distill-mcp to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(jq -r .version packages/mcp-server/package.json)"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package version $PKG"
            exit 1
          fi
          echo "Tag matches package version: $PKG"

      - name: Configure npm registry auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        working-directory: packages/mcp-server
        # bun publish resolves the workspace: protocol in devDependencies, which
        # npm publish does not. --access public is explicit and harmless for the
        # unscoped distill-mcp package.
        run: bun publish --access public

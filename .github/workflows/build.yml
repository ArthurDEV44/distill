name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check-types

  test:
    name: Test (mcp-server)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test with coverage (with Tree-sitter WASM init retry)
        working-directory: packages/mcp-server
        shell: bash
        run: |
          set +e
          bun run test:coverage
          first=$?
          if [ $first -ne 0 ]; then
            echo "::warning::First test run failed (likely Tree-sitter WASM init flake); retrying once"
            bun run test:coverage
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  knip:
    name: Knip (dead code)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Knip
        run: bun run knip

  shellcheck:
    name: Shellcheck (shell scripts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # shellcheck is pre-installed on GitHub's ubuntu-latest runners. The
      # v0.10 PreCompact hook (US-009) is declared /bin/sh and must stay
      # POSIX-clean. Other scripts under packages/mcp-server/scripts/ have
      # their own shells — they can be added to this gate when they are
      # explicitly reviewed for POSIX compliance.
      - name: Shellcheck (POSIX sh) — precompact hook
        run: shellcheck -s sh packages/mcp-server/scripts/precompact-hook.sh
